name: Quality

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  deterministic-core:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install local package
        run: python -m pip install -e .

      - name: Run standard-library tests
        run: python -m unittest discover -s tests -v

      - name: Compile Python sources
        run: python -m compileall -q src tests

      - name: Validate browser JavaScript
        run: node --check web/app.js

      - name: Run deterministic evaluation
        run: python -m agent_atelier.evaluate_cli

      - name: Audit public release contents
        run: python scripts/release_audit.py
